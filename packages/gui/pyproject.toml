[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "onelogin-migration-gui"
version = "0.2.0"
description = "GUI wizard for Okta to OneLogin migrations"
readme = "README.md"
authors = [{ name = "Jeffrie Budde" }]
requires-python = ">=3.10,<3.14"
dependencies = [
    "onelogin-migration-core>=0.2.0,<0.3.0",
    "PySide6>=6.8.3,<6.9",
]

[project.optional-dependencies]
test = [
    "pytest>=7.4",
    "pytest-qt>=4.2",
]
dev = [
    "pyinstaller>=6.0",
    "black>=23.0",
    "ruff>=0.1.0",
    "isort>=5.12",
]

[project.scripts]
onelogin-migration-gui = "onelogin_migration_gui.main:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
onelogin_migration_gui = [
    "assets/**/*",
]


[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.black]
line-length = 100
target-version = ['py310']

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B", "C4", "UP"]
ignore = ["E501"]

[tool.isort]
profile = "black"
line_length = 100
